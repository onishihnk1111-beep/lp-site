<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>OFFICIAL NOTICE</title>

<style>
*{margin:0;padding:0;box-sizing:border-box;}

body{
  min-height:100vh;
  display:flex;
  align-items:center;
  justify-content:center;
  font-family:-apple-system,BlinkMacSystemFont,"Hiragino Sans","Yu Gothic",sans-serif;
  background: radial-gradient(circle at top,#ff2d2d 0%,#b30000 45%,#4a0000 100%);
  color:#fff;
  padding:24px 16px;
  overflow:hidden;
}

.card{
  width:100%;
  max-width:420px;
  background:linear-gradient(180deg,rgba(80,0,0,0.90),rgba(40,0,0,0.96));
  border:1px solid rgba(255,255,255,0.08);
  border-radius:24px;
  padding:28px 20px;
  text-align:center;
  box-shadow:0 20px 60px rgba(0,0,0,0.5);
}

.label{
  display:inline-block;
  background:#ffd54f;
  color:#8b0000;
  font-weight:800;
  font-size:12px;
  letter-spacing:.06em;
  padding:8px 16px;
  border-radius:8px;
  margin-bottom:20px;
}

.title{
  font-size:20px;
  font-weight:800;
  margin-bottom:20px;
  line-height:1.5;
}

.count-area{
  min-height:340px;
  display:flex;
  flex-direction:column;
  justify-content:center;
}

.count{
  font-size:110px;
  font-weight:900;
  color:#ffd54f;
  text-shadow:
    0 0 10px rgba(255,213,79,0.95),
    0 0 20px rgba(255,213,79,0.75),
    0 0 40px rgba(255,213,79,0.55),
    0 0 70px rgba(255,213,79,0.35);
  min-height:140px;
  display:flex;
  align-items:center;
  justify-content:center;
  transition:transform .18s ease, opacity .18s ease, text-shadow .18s ease;
}

.count-sub{
  margin-top:10px;
  color:rgba(255,255,255,0.88);
  font-size:15px;
  line-height:1.8;
}

.final{
  display:none;
  opacity:0;
  transform:translateY(20px) scale(.98);
}

.final.show{
  display:block;
  animation:finalIn .55s ease forwards;
}

@keyframes finalIn{
  0%{
    opacity:0;
    transform:translateY(20px) scale(.98);
  }
  100%{
    opacity:1;
    transform:translateY(0) scale(1);
  }
}

.badge{
  display:inline-block;
  padding:10px 18px;
  border-radius:999px;
  background:rgba(255,255,255,0.10);
  border:1px solid rgba(255,255,255,0.14);
  font-size:14px;
  margin-bottom:24px;
}

.final-title{
  font-size:22px;
  font-weight:900;
  color:#ffe082;
  margin-bottom:18px;
  line-height:1.5;
  text-shadow:0 0 18px rgba(255,224,130,.18);
}

.amount{
  font-size:58px;
  font-weight:900;
  margin:18px 0 24px;
  color:#fff;
  text-shadow:0 0 22px rgba(255,255,255,.20);
}

.desc{
  font-size:16px;
  line-height:1.9;
  color:rgba(255,255,255,.94);
  margin-bottom:24px;
}

.btn{
  display:block;
  width:100%;
  background:linear-gradient(135deg,#06C755,#00B900);
  color:#fff;
  padding:20px 16px;
  border-radius:20px;
  font-weight:900;
  font-size:18px;
  text-decoration:none;
  margin-top:18px;
  position:relative;
  overflow:hidden;
  box-shadow:0 0 24px rgba(6,199,85,.28);
  transform:translateZ(0);
}

.btn small{
  display:block;
  margin-top:6px;
  font-size:13px;
  font-weight:500;
  opacity:.92;
}

.btn::before{
  content:"";
  position:absolute;
  top:0;
  left:-85%;
  width:55%;
  height:100%;
  background:linear-gradient(120deg,transparent,rgba(255,255,255,.48),transparent);
  transform:skewX(-25deg);
  animation:shine 1.8s infinite;
}

@keyframes shine{
  0%{left:-85%;}
  100%{left:130%;}
}

.note{
  margin-top:16px;
  font-size:12px;
  line-height:1.8;
  color:rgba(255,255,255,.48);
}

@media (max-width:480px){
  .count{font-size:96px;}
  .amount{font-size:52px;}
}
</style>
</head>

<body>
  <div class="card">

    <div id="countArea" class="count-area">
      <div class="label">OFFICIAL NOTICE</div>
      <div class="title">エントリー確認中…</div>
      <div id="count" class="count">3</div>
      <div id="sub" class="count-sub">確認が完了するまでお待ちください。</div>
    </div>

    <div id="final" class="final">
      <div class="label">OFFICIAL NOTICE</div>
      <div class="final-title">🎉当選おめでとうございます</div>
      <div class="badge">20歳以上限定特典</div>
      <div class="amount">350,000円</div>

      <div class="desc">
        ご当選おめでとうございます。<br>
        本日の特典受け取り期限が迫っています。<br>
        下記より公式LINEを追加してご確認ください。
      </div>

      <a href="https://lin.ee/あなたのURL" class="btn" target="_blank" rel="noopener noreferrer">
        今すぐ詳細を確認する
        <small>公式LINE追加画面が開きます</small>
      </a>

      <div class="note">
        ※詳細は公式案内をご確認ください。<br>
        ※表示内容は案内ページ内に記載しています。
      </div>
    </div>

  </div>

<script>
const steps = ["3","2","1","当選"];
let i = 0;

const count = document.getElementById("count");
const countArea = document.getElementById("countArea");
const final = document.getElementById("final");
const sub = document.getElementById("sub");

function popIn(text){
  count.textContent = text;
  count.style.opacity = "1";
  count.style.transform = "scale(1.22)";

  if(text === "当選"){
    count.style.textShadow =
      "0 0 12px rgba(255,140,170,0.95), 0 0 24px rgba(255,140,170,0.75), 0 0 48px rgba(255,140,170,0.55), 0 0 80px rgba(255,140,170,0.35)";
  } else {
    count.style.textShadow =
      "0 0 10px rgba(255,213,79,0.95), 0 0 20px rgba(255,213,79,0.75), 0 0 40px rgba(255,213,79,0.55), 0 0 70px rgba(255,213,79,0.35)";
  }

  setTimeout(() => {
    count.style.transform = "scale(1)";
  }, 110);
}

function nextStep(){
  count.style.opacity = "0";
  count.style.transform = "scale(0.72)";

  setTimeout(() => {
    i++;
    if(i < steps.length){
      popIn(steps[i]);
    }

    if(i === steps.length - 1){
      sub.innerHTML = "最終画面へ移動します。";
      setTimeout(() => {
        countArea.style.display = "none";
        final.classList.add("show");
      }, 900);
      return;
    }

    setTimeout(nextStep, 600);
  }, 180);
}

setTimeout(() => {
  popIn("3");
  setTimeout(nextStep, 600);
}, 120);
</script>
</body>
</html>
